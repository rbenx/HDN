<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disponibilidad de Especialidades y Turnos</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            padding: 20px 10px; 
            background-color: #dfcbb5; /* Fondo estilo madera */
            font-family: 'Courier New', Courier, monospace; 
        }
        .contenedor-principal {
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
        }
        .bloc-notas {
            background-color: #fffdf0; /* Papel crema */
            border-radius: 4px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            padding: 30px 20px;
            position: relative;
            min-height: 500px;
        }
        .agujeros {
            text-align: center;
            margin-bottom: 25px;
        }
        .cuadrito {
            display: inline-block;
            width: 14px;
            height: 14px;
            background-color: #bfa68f; 
            margin: 0 6px;
            border-radius: 2px;
        }
        .titulo-lista {
            font-family: 'Arial Black', sans-serif;
            font-size: 19px;
            color: #2b2b2b;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 35px;
            border-bottom: 2px dashed #ccc;
            padding-bottom: 15px;
        }
        .fila-especialidad {
            display: flex;
            align-items: center;
            margin-bottom: 22px;
            border-bottom: 1px solid #b4d2e7; /* Línea azul de cuaderno */
            padding-bottom: 6px;
        }
        .cuadro-cantidad {
            width: 38px;
            height: 38px;
            border: 2px solid #4a4a4a;
            background-color: #ffffff;
            font-family: 'Arial Black', sans-serif;
            font-size: 18px;
            color: #d32f2f; /* Rojo marcador */
            text-align: center;
            line-height: 34px;
            flex-shrink: 0;
        }
        .detalle-texto {
            padding-left: 15px;
            font-size: 14px;
            color: #333;
            font-weight: bold;
            text-transform: uppercase;
        }
        .nombre-medico {
            color: #555;
            font-weight: normal;
            font-family: Arial, sans-serif;
            text-transform: none;
            display: inline-block;
            margin-left: 5px;
        }
        .cargando {
            text-align: center;
            color: #888;
            font-style: italic;
            padding-top: 40px;
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <div class="bloc-notas">
            
            <!-- Detalles de la libreta -->
            <div class="agujeros">
                <div class="cuadrito"></div><div class="cuadrito"></div><div class="cuadrito"></div>
                <div class="cuadrito"></div><div class="cuadrito"></div><div class="cuadrito"></div>
                <div class="cuadrito"></div><div class="cuadrito"></div>
            </div>

            <!-- TÍTULO AUTOMÁTICO DESDE GOOGLE SHEETS -->
            <div class="titulo-lista" id="fecha-titulo">Cargando fecha...</div>
            
            <!-- CONTENEDOR DE LA LISTA -->
            <div id="contenedor-turnos">
                <p class="cargando">Obteniendo turnos del día...</p>
            </div>

        </div>
    </div>

    <script>
        // Enlace de publicación CSV de Google Sheets integrado con éxito
        const urlSheets = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTkvdozjXjzy6z3Qf7kX192RmZdAz2CDBa8L8cwq_9DqZN-5BEHAGvgYH3tezowA4ponEnLZNMZy1ja/pub?output=csv';

        async function cargarDatosRemotos() {
            try {
                const respuesta = await fetch(urlSheets);
                const textoCSV = await respuesta.text();
                
                // Dividimos el documento por líneas limpiando espacios vacíos
                const filas = textoCSV.split('\n').map(f => f.trim()).filter(f => f.length > 0);
                
                if (filas.length === 0) return;

                // 1. PROCESAR LA FECHA (Celda A1 de la primera fila)
                const primeraFila = filas[0].split(',');
                const fechaExtraida = primeraFila[0].replace(/^"(.*)"$/, '$1');
                
                document.getElementById('fecha-titulo').innerText = fechaExtraida;

                // 2. PROCESAR LAS ESPECIALIDADES (Desde la fila 2 en adelante)
                const contenedor = document.getElementById('contenedor-turnos');
                contenedor.innerHTML = ''; 

                const filasDeTurnos = filas.slice(1); 

                filasDeTurnos.forEach(fila => {
                    // Separar columnas y limpiar comillas automáticas del CSV
                    const columnas = fila.split(',').map(col => col.replace(/^"(.*)"$/, '$1'));
                    
                    const cantidad = columnas[0] || '00';
                    const especialidad = columnas[1] || '';
                    const medico = columnas[2] || '';

                    // Dibujar en la web solo si existe el nombre de la especialidad
                    if (especialidad) {
                        const divFila = document.createElement('div');
                        divFila.className = 'fila-especialidad';
                        
                        // Si la cantidad es 0 o '00', se atenúa un poco el texto de la fila
                        const esCero = parseInt(cantidad) === 0 || cantidad === '00' || cantidad.toLowerCase() === 'x';
                        const estiloDesactivado = esCero ? 'style="color: #aaa;"' : '';
                        const estiloMedico = esCero ? 'style="color: #bbb;"' : '';

                        divFila.innerHTML = `
                            <div class="cuadro-cantidad">${cantidad}</div>
                            <div class="detalle-texto" ${estiloDesactivado}>
                                ${especialidad} <span class="nombre-medico" ${estiloMedico}>${medico}</span>
                            </div>
                        `;
                        contenedor.appendChild(divFila);
                    }
                });

            } catch (error) {
                console.error('Error al conectar con Google Sheets:', error);
                document.getElementById('fecha-titulo').innerText = 'Error de conexión';
                document.getElementById('contenedor-turnos').innerHTML = '<p class="cargando">No se pudieron sincronizar los datos de hoy.</p>';
            }
        }

        // Inicializar la carga al abrir el documento
        cargarDatosRemotos();
    </script>
</body>
</html>
